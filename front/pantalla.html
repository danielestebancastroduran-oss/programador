<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Formulario de Datos</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f4f4;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.contenedor{
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
    width:300px;
}

input{
    width:100%;
    padding:10px;
    margin-top:5px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    width:100%;
    padding:10px;
    background:#007BFF;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#0056b3;
}
</style>

</head>

<body>

<div class="contenedor">

<h2>Formulario</h2>

<form>

<label>Nombre</label>
<input type="text" placeholder="Ingrese su nombre" required>

<label>Email</label>
<input type="email" placeholder="Ingrese su correo" required>

<label>Teléfono</label>
<input type="tel" placeholder="Ingrese su teléfono" required>

<button type="submit">Enviar</button>

</form>

</div>

</body>
</html>
